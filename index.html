<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WCAG Contrast Checker</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="screen-size-overlay" id="screen-size-overlay">
      <div class="screen-size-overlay__content">
        <i class="ph-bold ph-desktop"></i>
        <p>This tool requires a screen width of at least <strong>1100px</strong> to use.</p>
        <p class="screen-size-overlay__current">Current width: <span id="current-width"></span>px</p>
      </div>
    </div>

    <header>
      <div class="header-inner">
        <h1>WCAG Contrast Checker</h1>

        <div class="header-right">
          <a
            href="https://www.w3.org/WAI/WCAG22/Understanding/contrast-minimum.html"
            target="_blank"
            rel="noopener noreferrer"
            class="header-btn"
          >
            <i class="ph-bold ph-question-mark"></i>
          </a>

          <a
            href="https://github.com/patel-priyank/WCAG-Contrast-Checker"
            target="_blank"
            rel="noopener noreferrer"
            class="header-btn"
          >
            <i class="ph-bold ph-github-logo"></i>
          </a>

          <button class="header-btn" id="theme-toggle-btn" onclick="toggleTheme()">
            <i id="theme-label" class="ph-bold ph-sun"></i>
          </button>

          <a href="https://buymeacoffee.com/priyankp" target="_blank" rel="noopener noreferrer" class="header-btn">
            <i class="ph-bold ph-coffee"></i>
          </a>
        </div>
      </div>
    </header>

    <div class="main">
      <div class="toolbar">
        <div class="collapse-all-group">
          <button class="io-btn" onclick="collapseAll()">
            <i class="ph-bold ph-arrows-in-simple"></i>Collapse all
          </button>

          <button class="io-btn" onclick="expandAll()"><i class="ph-bold ph-arrows-out-simple"></i>Expand all</button>
        </div>

        <span class="count-label" id="count-label">1 palette</span>

        <div class="toolbar-right">
          <div class="io-btn-group">
            <button class="io-btn" onclick="exportPalettes()"><i class="ph-bold ph-upload-simple"></i>Export</button>

            <button class="io-btn" onclick="importPalettes()"><i class="ph-bold ph-download-simple"></i>Import</button>
          </div>

          <button class="io-btn reset-btn" onclick="resetPalettes()" id="reset-btn">
            <i class="ph-bold ph-trash"></i>Reset
          </button>

          <button class="add-btn" onclick="addPalette()">Add palette</button>
        </div>
      </div>

      <div class="palette-list" id="palette-list"></div>
    </div>

    <button
      class="scroll-top-btn"
      id="scroll-top-btn"
      onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
      aria-label="Scroll to top"
    >
      <i class="ph-bold ph-arrow-up"></i>
    </button>

    <script src="./script.js"></script>
  </body>
</html>
