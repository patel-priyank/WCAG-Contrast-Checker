<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WCAG Contrast Checker</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="screen-size-overlay" id="screen-size-overlay">
      <div class="screen-size-overlay__content">
        <i class="ph ph-desktop"></i>
        <p>This tool requires a screen width of at least <strong>1100px</strong> to use.</p>
        <p class="screen-size-overlay__current">Current width: <span id="current-width"></span>px</p>
      </div>
    </div>

    <header>
      <div class="header-inner">
        <h1>WCAG Contrast Checker</h1>

        <div class="header-right">
          <a href="https://buymeacoffee.com/priyankp" target="_blank" rel="noopener noreferrer" class="coffee-btn">
            <i class="ph ph-coffee"></i>
          </a>

          <button class="theme-toggle-btn" id="theme-toggle-btn" onclick="toggleTheme()">
            <i id="theme-label" class="ph ph-sun"></i>
          </button>

          <a
            href="https://github.com/patel-priyank/WCAG-Contrast-Checker"
            target="_blank"
            rel="noopener noreferrer"
            class="github-btn"
          >
            Source code
          </a>
        </div>
      </div>
    </header>

    <div class="main">
      <div class="toolbar">
        <div class="count-group">
          <span class="count-label" id="count-label">1 palette</span>

          <button class="reset-btn" onclick="resetPalettes()" id="reset-btn">Reset</button>
        </div>

        <div class="toolbar-right">
          <div class="io-btn-group">
            <button class="io-btn" onclick="exportPalettes()"><i class="ph ph-upload-simple"></i>Export</button>

            <button class="io-btn" onclick="importPalettes()"><i class="ph ph-download-simple"></i>Import</button>
          </div>

          <button class="add-btn" onclick="addPalette()">Add palette</button>
        </div>
      </div>

      <div class="palette-list" id="palette-list"></div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
